speaker_notes: 'Aim: Translate discussion into practical rules. Time: 5 minutes Instructions: Summarize patterns: Personal data → high risk Internal sensitive data → context dependent Operational data → often safe (with enterprise tools) Add nuance: “But even operational data can become sensitive if it reveals strategy or performance.” Give a decision heuristic: “If you wouldn’t email it externally—you probably shouldn’t paste it into an AI tool.” Debrief & Summary: “Think before you paste—and understand your tools.”'
