speaker_notes: 'Aim: Introduce Hoshin Kanri as the strategic cascade tool that connects daily project work to long-term organisational direction. Time: 6 minutes Instructions: Start with the definition box on the left: "Hoshin Kanri is a Japanese method developed at Toyota in the 1960s. The idea is simple: organisational goals should cascade all the way down to daily work — so nothing you do is disconnected from where the organisation is going." Explain the two words briefly: "Hoshin means direction and focus. Kanri means management and control. Together: managing your direction." Then walk the cascade on the right, top to bottom: "It starts with a 5-year vision. That gets translated into 3-year breakthrough objectives. Then annual goals. Then quarterly targets. And at the very bottom — your project." Point to the arrow on the right and ask: "Can you draw this arrow for your project right now? Does your project connect to a quarterly target — and does that target connect to something strategic?"
  Let the question land. Don''t answer it yet. Key discussion points: Most projects exist in isolation — they solve a local problem without connecting to anything above them. Hoshin makes that connection explicit and testable. If you can''t draw the arrow, that''s not a failure — it''s information. It means you have a conversation to have with your sponsor. Link to reality: "Imagine you''ve spent six months improving a reporting process. The report gets faster. But the strategic priority was forecast accuracy — and your report wasn''t even the input to the forecast. Efficient. But disconnected. Hoshin would have caught that in week one." Debrief & Summary: "Strategy without cascade is just a poster on the wall. Hoshin makes it operational."'
