speaker_notes: 'Aim: Land the five core learning outcomes as memorable, actionable capabilities — not just concepts. Time: 4 minutes Instructions: Walk through each numbered takeaway, but don''t read them verbatim. Translate each one into one plain sentence: "One — Discover. You can now spot where AI could add value in a process. Not everywhere — but somewhere specific. Two — Use. You''ve used AI tools hands-on. You know what they actually produce. Three — Analyse. You can weigh the trade-offs before committing — value, risk, effort. Four — Validate. You know that confident output is not the same as correct output. That''s the most important skill. Five — Navigate. You understand the ethical and governance boundaries well enough to make a judgment call." Then ask the room: "Which of these five do you feel most confident about right now — and which one do you want to keep developing?" Quick show of hands or one word in chat. Key discussion points: These five are a progression: discover →
  use → analyse → validate → navigate. Validation is the one most people underestimate before the session and rate highest after. These capabilities compound — the more you use AI, the better your judgment becomes. Link to reality: "In six months, the professionals who will get the most from AI are not the ones who used it the most. They''re the ones who learned to judge it the best. That''s what today was about." Debrief & Summary: "You don''t need to be an AI expert. You need to be an informed, critical user. That''s what you are now."'
