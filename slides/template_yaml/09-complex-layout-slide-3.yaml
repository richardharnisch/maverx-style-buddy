speaker_notes: 'Aim: Help participants recognize how much of their work is repetitive and rule-based—and therefore a strong candidate for AI-driven automation—before showing the Power Automate example. Time: 5 minutes (before demo) Instructions 1. Set the context (1 min) Start with: “Let’s shift from analysis and decision-making to something very practical—routine work.” Point to the slide: “AI is particularly strong when it comes to repetitive, structured tasks—the kind of work that follows patterns.” 2. Walk through the examples (2 min) Go through each item slowly and make it relatable: Invoice processing “Think about invoice processing—reading invoices, extracting fields, entering them into systems.” Ask: “Who here still does parts of this manually?” (Expect many hands) Expense categorization “Expense categorization—assigning transactions to the right cost category.” Add nuance: “Often this is based on rules, memory, or experience—but it’s still repetitive.” Financial reporting “Even
  reporting—while it feels analytical—often includes repetitive steps: gathering data formatting outputs writing similar commentary every month” 3. Make the key insight explicit (1 min) Say: “These tasks share three characteristics: they are repetitive they follow patterns they don’t always require deep judgment” Pause. Then: “That’s exactly where AI performs best.” 4. Bridge to automation (1 min) Transition clearly: “So instead of asking: Can AI do this? A better question is: Which parts of this process can be automated—and which parts still need human oversight? ” 5. Set up the demo Say: “Let’s make this concrete. I’ll show you a simple example using invoice processing.” “Not to turn you into Power Automate experts—but to show how AI fits into a real finance workflow.” Debrief & Summary (before demo transition) “If a task is repetitive and rule-based, AI can likely support or automate it.” “But—and this is important—it doesn’t remove the need for control. It changes your role from doing
  → checking.”'
