speaker_notes: 'Aim: ​ Introduce Moments of Truth as a customer value tool — ​ simple, clear, immediately applicable. ​ ​ Time: ​ 4 minutes ​ ​ Instructions: ​ Point to the definition first. ​ Read it out loud, then say: ​ "In other words — every time your customer interacts ​ with your organisation, they''re scoring you. ​ Consciously or not." ​ ​ Then walk the timeline left to right: ​ "They make a request. You deliver. ​ They use it for the first time. ​ Something goes wrong, they call you. ​ Then they decide: do we continue or not?" ​ ​ Ask: "At which of these moments do you think ​ most process problems become visible to the customer?" ​ Let 2-3 people answer. ​ There''s no wrong answer — the point is to get them ​ thinking from the customer''s perspective, not their own. ​ ​ Key discussion points: ​ - MoT is not about what YOU think matters in the process. ​ It''s about when THE CUSTOMER forms a judgment. ​ - A perfectly efficient internal process can still ​ fail every Moment of Truth
  if the customer never ​ feels the improvement. ​ - The MoT analysis maps ALL touchpoints first — ​ then you identify which ones are broken. ​ ​ Link to reality: ​ "Think about a supplier or internal team you stopped ​ trusting. It was probably not one big failure. ​ It was a series of small MoT failures — ​ the report that was always late, ​ the email that never got answered, ​ the forecast that was wrong three quarters in a row. ​ Each one a Moment of Truth. Each one a small loss." ​ ​ Debrief & Summary: ​ "Map the touchpoints. Find the broken moments. ​ That''s where your project belongs." ​'
