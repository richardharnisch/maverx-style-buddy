speaker_notes: 'Aim: Build real awareness of how AI tools handle data—so participants understand the actual risks , not just generic “be careful” advice. Time: 5 minutes Instructions: Explain: 1. Data flow (simple explanation) “When you enter data into an AI tool, three things can happen: It is processed temporarily It may be stored It may be used to improve the model” Now differentiate clearly: 2. Enterprise tools vs public tools Walk through two columns: Enterprise AI (e.g. Copilot, Azure OpenAI) Data is typically: not used to train the model processed within your tenant governed by contracts (e.g. Microsoft, OpenAI enterprise agreements) Often: data stays within a defined region (EU / US) audit & compliance controls apply Say: “These tools are designed for business use—so they usually come with safeguards.” Public AI tools (e.g. free ChatGPT, some SaaS tools) Data may: be stored be used for model improvement (depending on settings) Data location: often unclear may leave EU (GDPR implication)
  Say: “With public tools, you often don’t fully control where your data goes—or how it’s used.” 3. Data residency (important nuance) Explain: “For many organizations—especially in finance— where the data is stored matters.” Examples: EU vs US servers cross-border data transfer restrictions regulatory constraints Ask: “Would your organization allow financial data to be processed outside the EU?” 4. Training on your data Clarify a common misconception: “Not every AI tool trains on your data—but some do, and many people don’t know which.” Explain: Enterprise tools → usually no training on your inputs Public tools → depends on settings & provider 5. Practical decision rule Give something usable: “Before using any AI tool, ask three questions: Where is my data stored? Is it used to train the model? Is this tool approved by my organization?” Debrief & Summary: “The risk is not just what AI produces —it’s also what you feed into it .” “In finance, data sensitivity is the default—not the exception.”'
