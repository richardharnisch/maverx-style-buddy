speaker_notes: 'Aim: Surface what participants discovered about their own projects — and make the gaps visible as useful information, not failures. Time: 8 minutes Instructions: Ask the three questions one at a time. Don''t rush. Start with question 1: "What did you realise you don''t know yet about your own project?" Let 2–3 people answer. Validate every answer — there are no wrong ones here. Then question 2: "Which quadrant felt harder — Ambition or KPIs? Why?" This usually splits the room. Ambition is harder when the project lacks strategic clarity. KPIs are harder when success hasn''t been defined. Both are useful to surface. Then question 3: "What is ONE question you will ask your sponsor before Session 3?" Write these on the whiteboard or in chat if online. This turns the debrief into a commitment. Key discussion points: Not knowing is not a weakness — it''s where the real work begins. The gap between Ambition and KPIs is where most projects lose their sponsor''s trust. Leaving with
  one sponsor question is more valuable than leaving with a filled-in A3. Link to reality: "The best project managers I''ve worked with aren''t the ones with all the answers. They''re the ones who know exactly which questions to ask — and who to ask them to." Debrief & Summary: "Your gaps are your agenda. The questions you write down today become your Session 3 preparation."'
