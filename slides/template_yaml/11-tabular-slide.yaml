speaker_notes: 'Aim: Give the trainer a full overview of timing, modules and activities before the session starts. This is a trainer-only reference slide — not shown to participants. Time: 0 minutes (trainer reference only) Instructions: Use this slide during preparation, not during delivery. Review the three modules and their time allocations: Understand: 10 minutes — foundational, conceptual Reflect: 10 minutes — ethics and data awareness Experience: 60 minutes — the core of the session, hands-on Check your own timing before you start. If you''re running short, the "+/- 5 min" blocks in Experience are the easiest place to compress. Key discussion points: The 60-minute Experience block is where most energy goes — protect it. Ethics (Reflect) often runs long if discussion opens up — keep it tight. The script is a guide, not a script — read the room and adjust. Link to reality: "Experienced trainers don''t follow the script. They know it well enough to leave it." Debrief & Summary: "Know
  your timing. The session lives or dies by the Experience block."'
