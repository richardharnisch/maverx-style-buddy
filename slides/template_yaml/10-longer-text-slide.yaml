speaker_notes: 'Aim: Apply the session''s tools directly to participants'' own projects — moving from theory to a concrete, upgraded A3. Time: 35 minutes (including debrief) Instructions: Read the instructions clearly before sending groups to breakout rooms. Emphasise three things before they start: "First — one person shares their screen and you work on the A3 together, not separately. Second — if you don''t know the answer to a question, that''s not a problem. Write it down as a question for your sponsor. That''s the output. Third — you''re not finishing the A3. You''re upgrading it." While groups work, move between rooms. Listen for two things: Groups that are stuck on what a Moment of Truth is — redirect them to the customer perspective, not the internal process. Groups that are filling in KPIs without linking them to organisational goals — push them: "Which KPI tree does this sit in?" At 25 minutes, give a 5-minute warning. At 30 minutes, bring everyone back to the main room. Key discussion
  points: The Ambition quadrant is about customer and strategy — not about what the team wants to fix. Leading vs. lagging KPI distinction is often the hardest part — give examples if needed. Questions for the sponsor are as valuable as answers — they show strategic thinking. Link to reality: "The upgrade from 0.1 to 0.2 is not about having more answers. It''s about asking better questions. A sponsor who receives good questions trusts you more than one who receives a half-finished plan." Debrief & Summary: "What changed in your A3 is less important than what you now know you still need to find out."'
